services:
  recommender-api:
    build:
      context: ..              # ✅ go to project root
      dockerfile: api/Dockerfile

    container_name: ds11_recommender_api
    ports:
      - "8000:8000"

    volumes:
      - ../models:/app/models:ro
      - ../embeddings:/app/embeddings:ro
      - ../data:/app/data:ro

    environment:
      - PYTHONUNBUFFERED=1

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s